<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Receptionist Dashboard</title>
</head>
<body>
  <h1 id="name"></h1>
  <p>Role: Receptionist</p>
  <br/>
  <button onclick="logout()">Logout</button>

  <script>
    const raw = sessionStorage.getItem('access_token');
    if (!raw) { window.location.href = 'index.html'; }
    else {
      const payload = JSON.parse(atob(raw.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
      document.getElementById('name').textContent = payload.name || payload.preferred_username;
    }

    function logout() {
      const idToken = sessionStorage.getItem('id_token');
      sessionStorage.clear();
            window.location.href = 'http://localhost:9090/realms/patient-portal/protocol/openid-connect/logout?redirect_uri=http://localhost:8080/index.html';
    }
  </script>
</body>
</html>

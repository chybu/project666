<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Duplex Login</title>
    <style>
        body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #e6e6e6; }
        .container { display: flex; height: 100vh; }
        
        /* LEFT SIDEBAR */
        .left { width: 220px; background: #dcdcdc; border-right: 2px solid black; display: flex; flex-direction: column; align-items: center; }
        
        /* Updated Logo Styles */
        .logo-container { margin-top: 20px; }
        .logo-img { width: 160px; height: auto; display: block; }

        .recent { margin-top: 40px; background: #bfbfbf; padding: 10px 20px; }
        .left-panel { margin-top: 20px; width: 180px; height: 500px; background: #b3b3b3; position: relative; }
        
        /* CENTER AREA */
        .center { flex: 1; display: flex; justify-content: center; align-items: center; }
        
        /* Converted to a clickable link style */
        .login-btn {
            display: block;
            width: 350px;
            padding: 15px;
            background: #b3b3b3;
            border: 2px solid black;
            text-align: center;
            text-decoration: none;
            color: black;
            font-weight: bold;
            transition: background 0.3s;
        }
        .login-btn:hover { background: #999999; }

        /* RIGHT SIDEBAR */
        .right { width: 220px; background: #9c9c9c; border-left: 2px solid black; display: flex; align-items: flex-end; padding: 15px; }
        .footer { font-size: 14px; }
    </style>
</head>
<body>
<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <div class="logo-container">
            <!-- Ensure your logo is in src/main/resources/static/images/logo.png -->
            <img th:src="@{/images/logo.png}" alt="Duplex Logo" class="logo-img">
        </div>
        <div class="left-panel">
            <div class="recent">changelog</div>
        </div>
    </div>

    <!-- CENTER -->
    <div class="center">
        <div>
            <a th:href="@{/oauth2/authorization/keycloak}" class="login-btn">
               Log in To Duplex
            </a>
        </div>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
        <div class="footer">
            About - Help - ... <br>
            Contact Us - Privacy Policy
        </div>
    </div>

</div>
</body>
</html>

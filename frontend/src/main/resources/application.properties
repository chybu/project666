spring.application.name=demo

# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=admin
spring.datasource.password=password

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Resource Server Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/patient-portal

# Client Configuration
spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:9090/realms/patient-portal
spring.security.oauth2.client.registration.keycloak.client-id=frontend
spring.security.oauth2.client.registration.keycloak.client-secret=1DstED1kOcQnhvoISr5I5x9d1CLEZfj4
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email

# Error
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
spring.thymeleaf.cache=false
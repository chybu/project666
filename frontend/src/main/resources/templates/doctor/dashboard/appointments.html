<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctor Appointments</title>
    <link th:href="@{/dashboard/css/sb-admin-2.min.css}" rel="stylesheet">
</head>

<body id="page-top">

<div id="wrapper">

    <div th:replace="pageFragments/doctorSidebar :: sidebar"></div>

    <div id="content-wrapper" class="d-flex flex-column" style="margin-left: 225px;">

        <div id="content">

            <div th:replace="pageFragments/doctorTopbar :: topbar"></div>

            <div class="container-fluid">

                <h1 class="h3 mb-4 text-gray-800">Appointments</h1>

                <div class="card shadow mb-4">
                    <div class="card-header py-3 d-flex justify-content-between align-items-center">
                        <h6 class="m-0 font-weight-bold text-primary">Upcoming Appointment Results</h6>
                        <span class="text-muted small"
                              th:text="'Showing ' + ${#lists.size(upcomingAppointments)} + ' appointment(s)'"></span>
                    </div>

                    <div class="card-body">
                        <form method="get" th:action="@{/doctor/dashboard/appointments}">
                            <input type="hidden" name="completedFrom" th:value="${completedFrom}" />
                            <input type="hidden" name="completedEnd" th:value="${completedEnd}" />
                            <input type="hidden" name="completedType" th:value="${completedType}" />
                            <input type="hidden" name="completedPatientId" th:value="${completedPatientId}" />

                            <div class="form-row">
                                <div class="form-group col-md-3">
                                    <label for="upcomingFrom">Min Date</label>
                                    <input type="date"
                                           class="form-control"
                                           id="upcomingFrom"
                                           name="upcomingFrom"
                                           th:value="${upcomingFrom}">
                                </div>

                                <div class="form-group col-md-3">
                                    <label for="upcomingEnd">Max Date</label>
                                    <input type="date"
                                           class="form-control"
                                           id="upcomingEnd"
                                           name="upcomingEnd"
                                           th:value="${upcomingEnd}">
                                </div>

                                <div class="form-group col-md-3">
                                    <label for="upcomingType">Type</label>
                                    <select class="form-control" id="upcomingType" name="upcomingType">
                                        <option value="">All</option>
                                        <option th:each="appointmentType : ${appointmentTypes}"
                                                th:value="${appointmentType}"
                                                th:text="${appointmentType}"
                                                th:selected="${upcomingType != null and upcomingType == appointmentType}">
                                        </option>
                                    </select>
                                </div>

                                <div class="form-group col-md-3">
                                    <label for="upcomingPatientId">Patient</label>
                                    <select class="form-control" id="upcomingPatientId" name="upcomingPatientId">
                                        <option value="">All patients</option>
                                        <option th:each="patient : ${patients}"
                                                th:value="${patient.id}"
                                                th:text="${patient.firstName + ' ' + patient.lastName}"
                                                th:selected="${upcomingPatientId != null and upcomingPatientId == patient.id}">
                                        </option>
                                    </select>
                                </div>
                            </div>

                            <div class="mt-2">
                                <button type="submit" class="btn btn-primary btn-sm">Search</button>
                                <a th:href="@{/doctor/dashboard/appointments(
                                        completedFrom=${completedFrom},
                                        completedEnd=${completedEnd},
                                        completedType=${completedType},
                                        completedPatientId=${completedPatientId})}"
                                   class="btn btn-secondary btn-sm">
                                    Reset
                                </a>
                            </div>
                        </form>

                        <div th:if="${upcomingFilterError}" class="alert alert-danger mt-3" th:text="${upcomingFilterError}"></div>

                        <div class="mb-4"></div>

                        <div th:if="${upcomingAppointments == null or #lists.isEmpty(upcomingAppointments)}" class="text-muted">
                            No upcoming appointments.
                        </div>

                        <div th:if="${upcomingAppointments != null and !#lists.isEmpty(upcomingAppointments)}"
                             class="table-responsive">
                            <table class="table table-bordered table-hover">
                                <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Start</th>
                                    <th>End</th>
                                    <th>Patient</th>
                                    <th>Type</th>
                                    <th>Status</th>
                                </tr>
                                </thead>

                                <tbody>
                                <tr th:each="appointment : ${upcomingAppointments}">
                                    <td th:text="${#temporals.format(appointment.startTime, 'MMM dd, yyyy')}"></td>
                                    <td th:text="${#temporals.format(appointment.startTime, 'h:mm a')}"></td>
                                    <td th:text="${#temporals.format(appointment.endTime, 'h:mm a')}"></td>
                                    <td th:text="${appointment.patient.firstName + ' ' + appointment.patient.lastName}"></td>
                                    <td th:text="${appointment.type}"></td>
                                    <td>
                                        <span class="badge"
                                              th:classappend="
                                                ${appointment.status.name() == 'CONFIRMED'} ? 'badge-warning' :
                                                (${appointment.status.name() == 'COMPLETED'} ? 'badge-success' :
                                                'badge-secondary')"
                                              th:text="${appointment.status}">
                                        </span>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="card shadow mb-4">
                    <div class="card-header py-3 d-flex justify-content-between align-items-center">
                        <h6 class="m-0 font-weight-bold text-primary">Completed Appointment Results</h6>
                        <span class="text-muted small"
                              th:text="'Showing ' + ${#lists.size(completedAppointments)} + ' appointment(s)'"></span>
                    </div>

                    <div class="card-body">
                        <form method="get" th:action="@{/doctor/dashboard/appointments}">
                            <input type="hidden" name="upcomingFrom" th:value="${upcomingFrom}" />
                            <input type="hidden" name="upcomingEnd" th:value="${upcomingEnd}" />
                            <input type="hidden" name="upcomingType" th:value="${upcomingType}" />
                            <input type="hidden" name="upcomingPatientId" th:value="${upcomingPatientId}" />

                            <div class="form-row">
                                <div class="form-group col-md-3">
                                    <label for="completedFrom">Min Date</label>
                                    <input type="date"
                                           class="form-control"
                                           id="completedFrom"
                                           name="completedFrom"
                                           th:value="${completedFrom}">
                                </div>

                                <div class="form-group col-md-3">
                                    <label for="completedEnd">Max Date</label>
                                    <input type="date"
                                           class="form-control"
                                           id="completedEnd"
                                           name="completedEnd"
                                           th:value="${completedEnd}">
                                </div>

                                <div class="form-group col-md-3">
                                    <label for="completedType">Type</label>
                                    <select class="form-control" id="completedType" name="completedType">
                                        <option value="">All</option>
                                        <option th:each="appointmentType : ${appointmentTypes}"
                                                th:value="${appointmentType}"
                                                th:text="${appointmentType}"
                                                th:selected="${completedType != null and completedType == appointmentType}">
                                        </option>
                                    </select>
                                </div>

                                <div class="form-group col-md-3">
                                    <label for="completedPatientId">Patient</label>
                                    <select class="form-control" id="completedPatientId" name="completedPatientId">
                                        <option value="">All patients</option>
                                        <option th:each="patient : ${patients}"
                                                th:value="${patient.id}"
                                                th:text="${patient.firstName + ' ' + patient.lastName}"
                                                th:selected="${completedPatientId != null and completedPatientId == patient.id}">
                                        </option>
                                    </select>
                                </div>
                            </div>

                            <div class="mt-2">
                                <button type="submit" class="btn btn-primary btn-sm">Search</button>
                                <a th:href="@{/doctor/dashboard/appointments(
                                        upcomingFrom=${upcomingFrom},
                                        upcomingEnd=${upcomingEnd},
                                        upcomingType=${upcomingType},
                                        upcomingPatientId=${upcomingPatientId})}"
                                   class="btn btn-secondary btn-sm">
                                    Reset
                                </a>
                            </div>
                        </form>

                        <div th:if="${completedFilterError}" class="alert alert-danger mt-3" th:text="${completedFilterError}"></div>

                        <div class="mb-4"></div>

                        <div th:if="${completedAppointments == null or #lists.isEmpty(completedAppointments)}" class="text-muted">
                            No completed appointments.
                        </div>

                        <div th:if="${completedAppointments != null and !#lists.isEmpty(completedAppointments)}"
                             class="table-responsive">
                            <table class="table table-bordered table-hover">
                                <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Start</th>
                                    <th>End</th>
                                    <th>Patient</th>
                                    <th>Type</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                                </thead>

                                <tbody>
                                <tr th:each="appointment : ${completedAppointments}">
                                    <td th:text="${#temporals.format(appointment.startTime, 'MMM dd, yyyy')}"></td>
                                    <td th:text="${#temporals.format(appointment.startTime, 'h:mm a')}"></td>
                                    <td th:text="${#temporals.format(appointment.endTime, 'h:mm a')}"></td>
                                    <td th:text="${appointment.patient.firstName + ' ' + appointment.patient.lastName}"></td>
                                    <td th:text="${appointment.type}"></td>
                                    <td>
                                        <span class="badge"
                                              th:classappend="
                                                ${appointment.status.name() == 'CONFIRMED'} ? 'badge-warning' :
                                                (${appointment.status.name() == 'COMPLETED'} ? 'badge-success' :
                                                'badge-secondary')"
                                              th:text="${appointment.status}">
                                        </span>
                                    </td>
                                    <td>
                                        <a th:if="${appointment.status.name() == 'COMPLETED' and !appointment.hasPrescription}"
                                           th:href="@{/doctor/prescriptions/create-form(appointmentId=${appointment.id})}"
                                           class="btn btn-sm btn-primary">
                                            Prescription
                                        </a>

                                        <a th:if="${appointment.status.name() == 'COMPLETED'}"
                                           th:href="@{/doctor/labs/create-form(appointmentId=${appointment.id})}"
                                           class="btn btn-sm btn-info">
                                            Lab
                                        </a>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div th:replace="pageFragments/doctorFooter :: footer"></div>

    </div>
</div>

<script th:src="@{/dashboard/vendor/jquery/jquery.min.js}"></script>
<script th:src="@{/dashboard/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dashboard/js/sb-admin-2.min.js}"></script>

</body>
</html>

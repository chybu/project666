<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Doctor Prescriptions</title>
    <link th:href="@{/dashboard/css/sb-admin-2.min.css}" rel="stylesheet">
</head>

<body id="page-top">

<div id="wrapper">

    <div th:replace="pageFragments/doctorSidebar :: sidebar"></div>

    <div id="content-wrapper" class="d-flex flex-column" style="margin-left: 225px;">

        <div id="content">

            <div th:replace="pageFragments/doctorTopbar :: topbar"></div>

            <div class="container-fluid">

                <h1 class="h3 mb-4 text-gray-800">Prescriptions</h1>

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Search Prescriptions</h6>
                    </div>
                    <div class="card-body">
                        <form method="get" th:action="@{/doctor/dashboard/prescriptions}">
                            <div class="form-row">
                                <div class="form-group col-md-3">
                                    <label for="patientId">Patient</label>
                                    <select class="form-control" id="patientId" name="patientId">
                                        <option value="">All patients</option>
                                        <option th:each="patient : ${patients}"
                                                th:value="${patient.id}"
                                                th:text="${patient.firstName + ' ' + patient.lastName}"
                                                th:selected="${patientId != null and patientId == patient.id}">
                                        </option>
                                    </select>
                                </div>

                                <div class="form-group col-md-2">
                                    <label for="status">Status</label>
                                    <select class="form-control" id="status" name="status">
                                        <option value="">All</option>
                                        <option th:each="prescriptionStatus : ${prescriptionStatuses}"
                                                th:value="${prescriptionStatus}"
                                                th:text="${prescriptionStatus}"
                                                th:selected="${status != null and status == prescriptionStatus}">
                                        </option>
                                    </select>
                                </div>

                                <div class="form-group col-md-2">
                                    <label for="startDate">Start Date</label>
                                    <input type="date"
                                           class="form-control"
                                           id="startDate"
                                           name="startDate"
                                           th:value="${startDate}">
                                </div>

                                <div class="form-group col-md-2">
                                    <label for="endDate">End Date</label>
                                    <input type="date"
                                           class="form-control"
                                           id="endDate"
                                           name="endDate"
                                           th:value="${endDate}">
                                </div>

                                <div class="form-group col-md-3">
                                    <label for="remainingRefills">Remaining Refills</label>
                                    <input type="number"
                                           class="form-control"
                                           id="remainingRefills"
                                           name="remainingRefills"
                                           min="0"
                                           th:value="${remainingRefills}">
                                </div>
                            </div>

                            <div class="mt-2">
                                <button type="submit" class="btn btn-primary btn-sm">Search</button>
                                <a th:href="@{/doctor/dashboard/prescriptions}" class="btn btn-secondary btn-sm">Reset</a>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="mb-3">
                    <a th:href="@{/doctor/dashboard/appointments}" class="btn btn-primary">
                        Create Prescription from Appointment
                    </a>
                </div>

                <div class="card shadow mb-4">
                    <div class="card-header py-3 d-flex justify-content-between align-items-center">
                        <h6 class="m-0 font-weight-bold text-primary">Prescription Results</h6>
                        <span class="text-muted small"
                              th:text="'Showing ' + ${#lists.size(prescriptions)} + ' prescription(s)'"></span>
                    </div>

                    <div class="card-body">

                        <div th:if="${#lists.isEmpty(prescriptions)}">
                            No prescriptions found.
                        </div>

                        <div th:unless="${#lists.isEmpty(prescriptions)}" class="table-responsive">
                            <table class="table table-bordered">
                                <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Patient</th>
                                    <th>Start Date</th>
                                    <th>End Date</th>
                                    <th>Status</th>
                                    <th>Refills</th>
                                    <th>Actions</th>
                                </tr>
                                </thead>

                                <tbody>
                                <tr th:each="p : ${prescriptions}">
                                    <td th:text="${#temporals.format(p.createdAt, 'MMM dd, yyyy')}"></td>
                                    <td th:text="${p.patient != null ? p.patient.firstName + ' ' + p.patient.lastName : 'N/A'}"></td>
                                    <td th:text="${p.startDate != null ? #temporals.format(p.startDate, 'MMM dd, yyyy') : 'N/A'}"></td>
                                    <td th:text="${p.endDate != null ? #temporals.format(p.endDate, 'MMM dd, yyyy') : 'N/A'}"></td>

                                    <td>
                                        <span class="badge"
                                              th:classappend="
                                                ${p.status.name() == 'ACTIVE'} ? 'badge-success' :
                                                (${p.status.name() == 'COMPLETED'} ? 'badge-primary' :
                                                'badge-secondary')"
                                              th:text="${p.status}">
                                        </span>
                                    </td>

                                    <td th:text="${p.remainingRefills + ' / ' + p.totalRefills}"></td>

                                    <td>
                                        <form th:action="@{/doctor/prescriptions/cancel}" method="post">
                                            <input type="hidden" name="prescriptionId" th:value="${p.id}" />
                                            <button class="btn btn-sm btn-danger"
                                                    th:disabled="${p.status.name() == 'COMPLETED' or p.status.name() == 'CANCELLED'}">
                                                Cancel
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                    </div>
                </div>

            </div>
        </div>

        <div th:replace="pageFragments/doctorFooter :: footer"></div>

    </div>
</div>

<script th:src="@{/dashboard/vendor/jquery/jquery.min.js}"></script>
<script th:src="@{/dashboard/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dashboard/js/sb-admin-2.min.js}"></script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Access Requests</title>
    <link th:href="@{/dashboard/css/sb-admin-2.min.css}" rel="stylesheet">
</head>

<body id="page-top">

<div id="wrapper">

    <div th:replace="pageFragments/doctorSidebar :: sidebar"></div>

    <div id="content-wrapper" class="d-flex flex-column" style="margin-left: 225px;">

        <div id="content">

            <div th:replace="pageFragments/doctorTopbar :: topbar"></div>

            <div class="container-fluid">

                <h1 class="h3 mb-4 text-gray-800">Access Requests</h1>
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <!-- CREATE REQUEST -->
                <div class="card shadow mb-4">
                    <div class="card-header">
                        Request Access
                    </div>

                    <div class="card-body">

                        <form th:action="@{/doctor/access-requests/create}" method="post">

                            <div class="form-group">
                                <label>Patient</label>
                                <select name="patientId" class="form-control" required>
                                    <option value="">Select Patient</option>
                                    <option th:each="p : ${patients}"
                                            th:value="${p.id}"
                                            th:text="${p.firstName + ' ' + p.lastName}">
                                    </option>
                                </select>
                                <small class="form-text text-muted">
                                    Select a patient to request access
                                </small>
                            </div>

                            <div class="form-group">
                                <label>Record Type</label>
                                <select name="type" class="form-control" required>
                                    <option value="">Select Type</option>
                                    <option value="PRECHECK">Precheck</option>
                                    <option value="LAB_REQUEST">Lab Request</option>
                                    <option value="PRESCRIPTION">Prescription</option>
                                </select>
                                <small class="form-text text-muted">
                                    Select the type of record you want access to
                                </small>
                            </div>

                            <button type="submit" class="btn btn-primary">
                                Request Access
                            </button>

                        </form>

                    </div>
                </div>

                <!-- LIST REQUESTS -->
                <div class="card shadow mb-4">
                    <div class="card-header">
                        Your Requests
                    </div>

                    <div class="card-body">

                        <div th:if="${#lists.isEmpty(accessRequests)}">
                            No access requests found.
                        </div>

                        <div th:unless="${#lists.isEmpty(accessRequests)}" class="table-responsive">
                            <table class="table table-bordered">
                                <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Patient</th>
                                    <th>Type</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                                </thead>

                                <tbody>
                                <tr th:each="req : ${accessRequests}">

                                    <td th:text="${#temporals.format(req.createdAt, 'MMM dd, yyyy')}"></td>

                                    <td th:text="${req.patient != null ? req.patient.firstName + ' ' + req.patient.lastName : 'N/A'}"></td>

                                    <td th:text="${req.recordType}"></td>

                                    <td>
                                        <span class="badge"
                                              th:classappend="
                                                ${req.status.name() == 'PENDING'} ? 'badge-warning' :
                                                (${req.status.name() == 'APPROVED'} ? 'badge-success' :
                                                (${req.status.name() == 'REJECTED'} ? 'badge-danger' :
                                                (${req.status.name() == 'CANCELLED'} ? 'badge-secondary' :
                                                'badge-dark')))"
                                              th:text="${req.status}">
                                        </span>
                                    </td>

                                    <td>
                                        <form th:action="@{/doctor/access-requests/cancel}" method="post">
                                            <input type="hidden" name="accessId" th:value="${req.id}" />
                                            <button class="btn btn-sm btn-danger"
                                                    th:disabled="${req.status.name() != 'PENDING'}">
                                                Cancel
                                            </button>
                                        </form>
                                    </td>

                                </tr>
                                </tbody>
                            </table>
                        </div>

                    </div>
                </div>

            </div>
        </div>

        <div th:replace="pageFragments/doctorFooter :: footer"></div>

    </div>
</div>

<script th:src="@{/dashboard/vendor/jquery/jquery.min.js}"></script>
<script th:src="@{/dashboard/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dashboard/js/sb-admin-2.min.js}"></script>

</body>
</html>

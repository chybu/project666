<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lab Requests</title>
    <link th:href="@{/dashboard/css/sb-admin-2.min.css}" rel="stylesheet">
</head>

<body id="page-top">

<div id="wrapper">

    <div th:replace="pageFragments/doctorSidebar :: sidebar"></div>

    <div id="content-wrapper" class="d-flex flex-column" style="margin-left: 225px;">

        <div id="content">

            <div th:replace="pageFragments/doctorTopbar :: topbar"></div>

            <div class="container-fluid">

                <h1 class="h3 mb-4 text-gray-800">Lab Requests</h1>

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <div class="card shadow mb-4">
                    <div class="card-header py-3 d-flex justify-content-between align-items-center">
                        <h6 class="m-0 font-weight-bold text-primary">Lab Request Results</h6>
                        <span class="text-muted small"
                              th:text="'Showing ' + ${#lists.size(labs)} + ' lab request(s)'"></span>
                    </div>
                    <div class="card-body">
                        <form method="get" th:action="@{/doctor/dashboard/labs}">
                            <div class="form-row">
                                <div class="form-group col-md-3">
                                    <label for="patientId">Patient</label>
                                    <select class="form-control" id="patientId" name="patientId">
                                        <option value="">All patients</option>
                                        <option th:each="patient : ${patients}"
                                                th:value="${patient.id}"
                                                th:text="${patient.firstName + ' ' + patient.lastName}"
                                                th:selected="${patientId != null and patientId == patient.id}">
                                        </option>
                                    </select>
                                </div>

                                <div class="form-group col-md-3">
                                    <label for="status">Status</label>
                                    <select class="form-control" id="status" name="status">
                                        <option value="">All</option>
                                        <option th:each="labStatus : ${labRequestStatuses}"
                                                th:value="${labStatus}"
                                                th:text="${labStatus}"
                                                th:selected="${status != null and status == labStatus}">
                                        </option>
                                    </select>
                                </div>

                                <div class="form-group col-md-3">
                                    <label for="minDate">Min Date</label>
                                    <input type="date"
                                           class="form-control"
                                           id="minDate"
                                           name="minDate"
                                           th:value="${minDate}">
                                </div>

                                <div class="form-group col-md-3">
                                    <label for="maxDate">Max Date</label>
                                    <input type="date"
                                           class="form-control"
                                           id="maxDate"
                                           name="maxDate"
                                           th:value="${maxDate}">
                                </div>
                            </div>

                            <div class="mt-2">
                                <button type="submit" class="btn btn-primary btn-sm">Search</button>
                                <a th:href="@{/doctor/dashboard/labs}" class="btn btn-secondary btn-sm">Reset</a>
                            </div>
                        </form>
                        
                        <div class="mb-4"></div>

                        <div th:if="${#lists.isEmpty(labs)}">
                            No lab requests found.
                        </div>

                        <div th:unless="${#lists.isEmpty(labs)}" class="table-responsive">
                            <table class="table table-bordered">
                                <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Patient</th>
                                    <th>Test</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                                </thead>

                                <tbody>
                                <tr th:each="lab : ${labs}">
                                    <td th:text="${#temporals.format(lab.createdAt, 'MMM dd, yyyy')}"></td>

                                    <td th:text="${lab.patient != null ? lab.patient.firstName + ' ' + lab.patient.lastName : 'N/A'}"></td>

                                    <td>
                                        <span th:if="${lab.labTests != null and !#lists.isEmpty(lab.labTests)}"
                                              th:each="test : ${lab.labTests}">
                                            <span th:text="${test.name}"></span><br/>
                                        </span>

                                        <span th:if="${lab.labTests == null or #lists.isEmpty(lab.labTests)}">
                                            N/A
                                        </span>
                                    </td>

                                    <td>
                                        <span class="badge"
                                              th:classappend="
                                                ${lab.status.name() == 'REQUESTED'} ? 'badge-warning' :
                                                (${lab.status.name() == 'IN_PROGRESS'} ? 'badge-info' :
                                                (${lab.status.name() == 'COMPLETED'} ? 'badge-success' :
                                                (${lab.status.name() == 'CANCELLED'} ? 'badge-danger' :
                                                'badge-secondary')))"
                                              th:text="${lab.status}">
                                        </span>
                                    </td>

                                    <td>
                                        <a class="btn btn-sm btn-info mr-2"
                                           th:href="@{/doctor/dashboard/labs/view(labId=${lab.id})}">
                                            View
                                        </a>
                                        <a class="btn btn-sm btn-outline-secondary mr-2"
                                           th:href="@{/pdf/lab/doctor(labId=${lab.id})}">
                                            PDF
                                        </a>
                                        <form th:action="@{/doctor/labs/cancel}" method="post" class="d-inline">
                                            <input type="hidden" name="labId" th:value="${lab.id}" />
                                            <button class="btn btn-sm btn-danger"
                                                    th:disabled="${lab.status.name() == 'COMPLETED' or lab.status.name() == 'CANCELLED'}">
                                                Cancel
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                    </div>
                </div>

            </div>
        </div>

        <div th:replace="pageFragments/doctorFooter :: footer"></div>

    </div>
</div>

<script th:src="@{/dashboard/vendor/jquery/jquery.min.js}"></script>
<script th:src="@{/dashboard/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dashboard/js/sb-admin-2.min.js}"></script>

</body>
</html>

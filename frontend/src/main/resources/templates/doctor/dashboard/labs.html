<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lab Requests</title>
    <link th:href="@{/dashboard/css/sb-admin-2.min.css}" rel="stylesheet">
</head>

<body id="page-top">

<div id="wrapper">

    <div th:replace="pageFragments/doctorSidebar :: sidebar"></div>

    <div id="content-wrapper" class="d-flex flex-column" style="margin-left: 225px;">

        <div id="content">

            <div th:replace="pageFragments/doctorTopbar :: topbar"></div>

            <div class="container-fluid">

                <h1 class="h3 mb-4 text-gray-800">Lab Requests</h1>

                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <div class="card shadow mb-4">
                    <div class="card-header">
                        Lab Requests
                    </div>

                    <div class="card-body">

                        <div th:if="${#lists.isEmpty(labs)}">
                            No lab requests found.
                        </div>

                        <div th:unless="${#lists.isEmpty(labs)}" class="table-responsive">
                            <table class="table table-bordered">
                                <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Patient</th>
                                    <th>Test</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                                </thead>

                                <tbody>
                                <tr th:each="lab : ${labs}">
                                    <td th:text="${#temporals.format(lab.createdAt, 'MMM dd, yyyy')}"></td>

                                    <td th:text="${lab.patient != null ? lab.patient.firstName + ' ' + lab.patient.lastName : 'N/A'}"></td>

                                    <td>
                                        <span th:if="${lab.labTests != null and !#lists.isEmpty(lab.labTests)}"
                                              th:each="test : ${lab.labTests}">
                                            <span th:text="${test.name}"></span><br/>
                                        </span>

                                        <span th:if="${lab.labTests == null or #lists.isEmpty(lab.labTests)}">
                                            N/A
                                        </span>
                                    </td>

                                    <td>
                                        <span class="badge"
                                              th:classappend="
                                                ${lab.status.name() == 'REQUESTED'} ? 'badge-warning' :
                                                (${lab.status.name() == 'COMPLETED'} ? 'badge-success' :
                                                'badge-secondary')"
                                              th:text="${lab.status}">
                                        </span>
                                    </td>

                                    <td>
                                        <form th:action="@{/doctor/labs/cancel}" method="post">
                                            <input type="hidden" name="labId" th:value="${lab.id}" />
                                            <button class="btn btn-sm btn-danger"
                                                    th:disabled="${lab.status.name() == 'COMPLETED' or lab.status.name() == 'CANCELLED'}">
                                                Cancel
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                    </div>
                </div>

            </div>
        </div>

        <div th:replace="pageFragments/doctorFooter :: footer"></div>

    </div>
</div>

<script th:src="@{/dashboard/vendor/jquery/jquery.min.js}"></script>
<script th:src="@{/dashboard/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dashboard/js/sb-admin-2.min.js}"></script>

</body>
</html>

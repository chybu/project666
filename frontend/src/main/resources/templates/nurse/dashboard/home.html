<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nurse Dashboard</title>
    <link th:href="@{/dashboard/css/sb-admin-2.min.css}" rel="stylesheet">
    <link th:href="@{/dashboard/css/custom.css}" rel="stylesheet">
</head>

<body id="page-top">

<div id="wrapper">

    <div th:replace="pageFragments/nurseSidebar :: sidebar"></div>

    <div id="content-wrapper" class="d-flex flex-column">

        <div id="content">

            <div th:replace="pageFragments/nurseTopbar :: topbar"></div>

            <div class="container-fluid">

                <h1 class="h3 mb-4 text-gray-800">Nurse Dashboard</h1>

                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary"
                            th:text="'Appointments for ' + ${#temporals.format(today, 'MMMM dd, yyyy')}">
                        </h6>
                    </div>
                    <div class="card-body">
                        <div th:if="${#lists.isEmpty(todayAppointments)}" class="text-muted">
                            No appointments scheduled for today.
                        </div>
                        <div th:unless="${#lists.isEmpty(todayAppointments)}" class="table-responsive">
                            <table class="table table-bordered">
                                <thead>
                                    <tr>
                                        <th>Start</th>
                                        <th>End</th>
                                        <th>Patient</th>
                                        <th>Type</th>
                                        <th>Status</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="appointment : ${todayAppointments}">
                                        <td th:text="${#temporals.format(appointment.startTime, 'h:mm a')}"></td>
                                        <td th:text="${#temporals.format(appointment.endTime, 'h:mm a')}"></td>
                                        <td th:text="${appointment.patient.firstName + ' ' + appointment.patient.lastName}"></td>
                                        <td th:text="${appointment.type}"></td>
                                        <td th:text="${appointment.status}"></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Staff Bulletin</h6>
                    </div>
                    <div class="card-body">
                        <ul>
                            <li>Check patient vitals before doctor arrives</li>
                            <li>Update charts immediately after intake</li>
                            <li>New documentation policy in effect</li>
                        </ul>
                    </div>
                </div>

            </div>
        </div>

        <div th:replace="pageFragments/nurseFooter :: footer"></div>

    </div>
</div>

<script th:src="@{/dashboard/vendor/jquery/jquery.min.js}"></script>
<script th:src="@{/dashboard/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dashboard/js/sb-admin-2.min.js}"></script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nurse Prechecks</title>
    <link th:href="@{/dashboard/css/sb-admin-2.min.css}" rel="stylesheet">
</head>

<body id="page-top">

<div id="wrapper">

    <div th:replace="pageFragments/nurseSidebar :: sidebar"></div>

    <div id="content-wrapper" class="d-flex flex-column" style="margin-left: 225px;">

        <div id="content">

            <div th:replace="pageFragments/nurseTopbar :: topbar"></div>

            <div class="container-fluid">

                <h1 class="h3 mb-4 text-gray-800">Prechecks</h1>

                <div class="card shadow mb-4">
                    <div class="card-header py-3 d-flex justify-content-between align-items-center">
                        <h6 class="m-0 font-weight-bold text-primary">My Prechecks</h6>
                        <span class="text-muted small"
                              th:text="'Showing ' + ${#lists.size(prechecks)} + ' precheck(s)'"></span>
                    </div>

                    <div class="card-body">
                        <form method="get" th:action="@{/nurse/dashboard/prechecks}" class="mb-4">
                            <div class="form-row">
                                <div class="form-group col-md-3">
                                    <label for="from">Min Date</label>
                                    <input type="date"
                                           class="form-control"
                                           id="from"
                                           name="from"
                                           th:value="${from}">
                                </div>

                                <div class="form-group col-md-3">
                                    <label for="end">Max Date</label>
                                    <input type="date"
                                           class="form-control"
                                           id="end"
                                           name="end"
                                           th:value="${end}">
                                </div>

                                <div class="form-group col-md-3">
                                    <label for="status">Status</label>
                                    <select class="form-control" id="status" name="status">
                                        <option value="">All</option>
                                        <option th:each="statusOption : ${precheckStatuses}"
                                                th:value="${statusOption}"
                                                th:text="${statusOption}"
                                                th:selected="${status != null and status == statusOption}">
                                        </option>
                                    </select>
                                </div>

                                <div class="form-group col-md-3">
                                    <label for="patientId">Patient</label>
                                    <select class="form-control" id="patientId" name="patientId">
                                        <option value="">All patients</option>
                                        <option th:each="patient : ${patients}"
                                                th:value="${patient.id}"
                                                th:text="${patient.firstName + ' ' + patient.lastName}"
                                                th:selected="${patientId != null and patientId == patient.id}">
                                        </option>
                                    </select>
                                </div>
                            </div>

                            <div class="mt-2">
                                <button type="submit" class="btn btn-primary btn-sm">Search</button>
                                <a th:href="@{/nurse/dashboard/prechecks}" class="btn btn-secondary btn-sm">Reset</a>
                            </div>
                        </form>

                        <div th:if="${filterError}" class="alert alert-danger mt-3" th:text="${filterError}"></div>

                        <div th:if="${prechecks == null or #lists.isEmpty(prechecks)}" class="text-muted">
                            No prechecks found.
                        </div>

                        <div th:if="${prechecks != null and !#lists.isEmpty(prechecks)}">
                            <div th:each="pc, stat : ${prechecks}" class="mb-4">
                                <hr th:if="${!stat.first}" class="my-4">
                                <div class="mb-2">
                                    <strong>Date:</strong>
                                    <span th:text="${#temporals.format(pc.createdAt, 'MMM dd, yyyy h:mm a')}"></span>
                                    &nbsp;|&nbsp;
                                    <strong>Status:</strong>
                                    <span class="badge"
                                          th:classappend="
                                            ${pc.status.name() == 'VALID'} ? 'badge-success' :
                                            (${pc.status.name() == 'CANCELLED'} ? 'badge-danger' :
                                            'badge-secondary')"
                                          th:text="${pc.status}">
                                    </span>
                                    &nbsp;|&nbsp;
                                    <strong>Patient:</strong>
                                    <span th:text="${pc.patient != null ? pc.patient.firstName + ' ' + pc.patient.lastName : 'N/A'}"></span>
                                </div>
                                <table class="table table-bordered">
                                    <thead>
                                        <tr>
                                            <th>Pulse</th>
                                            <th>Sugar</th>
                                            <th>Temperature</th>
                                            <th>Height</th>
                                            <th>Weight</th>
                                            <th>Note</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td th:text="${pc.pulse}"></td>
                                            <td th:text="${pc.sugar}"></td>
                                            <td th:text="${pc.temperature}"></td>
                                            <td th:text="${pc.height}"></td>
                                            <td th:text="${pc.weight}"></td>
                                            <td th:text="${pc.note != null ? pc.note : 'N/A'}"></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div th:replace="pageFragments/nurseFooter :: footer"></div>

    </div>
</div>

<script th:src="@{/dashboard/vendor/jquery/jquery.min.js}"></script>
<script th:src="@{/dashboard/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dashboard/js/sb-admin-2.min.js}"></script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nurse Appointments</title>
    <link th:href="@{/dashboard/css/sb-admin-2.min.css}" rel="stylesheet">
</head>

<body id="page-top">

<div id="wrapper">

    <div th:replace="pageFragments/nurseSidebar :: sidebar"></div>

    <div id="content-wrapper" class="d-flex flex-column">

        <div id="content">

            <div th:replace="pageFragments/nurseTopbar :: topbar"></div>

            <div class="container-fluid">

                <h1 class="h3 mb-4 text-gray-800">Appointments</h1>

                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">
                            Upcoming Appointments
                        </h6>
                    </div>

                    <div class="card-body">

                        <div class="table-responsive">
                            <table class="table table-bordered">

                                <thead>
                                    <tr>
                                        <th>Patient</th>
                                        <th>Date</th>
                                        <th>Doctor</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>

                                <tbody>
                                    <tr th:each="appointment : ${appointments}">
                                        <td th:text="${appointment.patientName}">John Doe</td>
                                        <td th:text="${appointment.startTime}">Date</td>
                                        <td th:text="${appointment.doctorName}">Dr</td>
                                        <td>
                                            <button class="btn btn-primary btn-sm"
                                                    data-toggle="modal"
                                                    data-target="#intakeModal">
                                                Enter Information
                                            </button>
                                        </td>
                                    </tr>
                                </tbody>

                            </table>
                        </div>

                    </div>
                </div>

            </div>
        </div>

        <div th:replace="pageFragments/nurseFooter :: footer"></div>

    </div>
</div>

<!-- Intake Modal -->
<div class="modal fade" id="intakeModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Patient Intake</h5>
                <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>

            <div class="modal-body">

                <form>
                    <div class="form-group">
                        <label>Weight</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="form-group">
                        <label>Height</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="form-group">
                        <label>Blood Pressure</label>
                        <input type="text" class="form-control">
                    </div>

                    <div class="form-group">
                        <label>Upload Document</label>
                        <input type="file" class="form-control">
                    </div>
                </form>

            </div>

            <div class="modal-footer">
                <button class="btn btn-success">Save</button>
            </div>

        </div>
    </div>
</div>

<script th:src="@{/dashboard/vendor/jquery/jquery.min.js}"></script>
<script th:src="@{/dashboard/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dashboard/js/sb-admin-2.min.js}"></script>

</body>
</html>

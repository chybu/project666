<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Receptionist Check-In</title>
  <link th:href="@{/dashboard/css/sb-admin-2.min.css}" rel="stylesheet">
  <link th:href="@{/dashboard/css/custom.css}" rel="stylesheet">
</head>

<body id="page-top">

<div id="wrapper">

  <div th:replace="~{pageFragments/receptionistSidebar :: sidebar}"></div>

  <div id="content-wrapper" class="d-flex flex-column">
    <div id="content">

      <div th:replace="~{pageFragments/receptionistTopbar :: topbar}"></div>

      <div class="container-fluid">

        <div class="d-sm-flex align-items-center justify-content-between mb-4">
          <h1 class="h3 mb-0 text-gray-800">Check-In Queue</h1>
          <a th:href="@{/receptionist/dashboard/appointments}" class="btn btn-secondary btn-sm">
            Back to Appointments
          </a>
        </div>
        <div class="card shadow mb-4">
          <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">Filter Today’s Check-In Queue</h6>
          </div>
          <div class="card-body">
            <form method="get" th:action="@{/receptionist/dashboard/check-in}">
              <div class="form-row">

                <div class="form-group col-md-4">
                  <label for="patientId">Patient</label>
                  <select class="form-control"
                          id="patientId"
                          name="patientId">
                    <option value="">All patients</option>
                    <option th:each="patient : ${patients}"
                            th:value="${patient.id}"
                            th:text="${patient.firstName + ' ' + patient.lastName}"
                            th:selected="${patientId != null and patientId == patient.id.toString()}">
                    </option>
                  </select>
                  <small class="text-danger"
                         th:if="${patientIdError}"
                         th:text="${patientIdError}"></small>
                </div>

                <div class="form-group col-md-4">
                  <label for="doctorId">Doctor</label>
                  <select class="form-control"
                          id="doctorId"
                          name="doctorId">
                    <option value="">All doctors</option>
                    <option th:each="doctor : ${doctors}"
                            th:value="${doctor.id}"
                            th:text="${doctor.firstName + ' ' + doctor.lastName}"
                            th:selected="${doctorId != null and doctorId == doctor.id.toString()}">
                    </option>
                  </select>
                  <small class="text-danger"
                         th:if="${doctorIdError}"
                         th:text="${doctorIdError}"></small>
                </div>

              </div>


              <div class="mt-2">
                <button type="submit" class="btn btn-primary btn-sm mr-2">
                  Search
                </button>

                <a th:href="@{/receptionist/dashboard/check-in}"
                   class="btn btn-secondary btn-sm">
                  Reset
                </a>
              </div>
            </form>
          </div>
        </div>

        <!-- Queue -->
        <div class="card shadow mb-4">
          <div class="card-header py-3 d-flex justify-content-between align-items-center">
            <h6 class="m-0 font-weight-bold text-primary">Today’s Confirmed Appointments</h6>
            <span class="text-muted small"
                  th:text="'Showing ' + ${#lists.size(appointments)} + ' appointment(s)'"></span>
          </div>
          <div class="card-body">
            <div th:if="${#lists.isEmpty(appointments)}" class="text-muted">
              No confirmed appointments found for today.
            </div>

            <div th:unless="${#lists.isEmpty(appointments)}" class="table-responsive">
              <table class="table table-bordered table-hover">
                <thead>
                <tr>
                  <th>Start</th>
                  <th>End</th>
                  <th>Patient</th>
                  <th>Doctor</th>
                  <th>Type</th>
                  <th>Status</th>
                  <th style="min-width: 220px;">Check-In</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="appointment : ${appointments}">
                  <td th:text="${#temporals.format(appointment.startTime, 'MMM dd, yyyy h:mm a')}"></td>
                  <td th:text="${#temporals.format(appointment.endTime, 'MMM dd, yyyy h:mm a')}"></td>
                  <td th:text="${appointment.patient != null ? appointment.patient.firstName + ' ' + appointment.patient.lastName : 'N/A'}"></td>
                  <td th:text="${appointment.doctor != null ? appointment.doctor.firstName + ' ' + appointment.doctor.lastName : 'N/A'}"></td>
                  <td th:text="${appointment.type}"></td>
                  <td>
                                        <span class="badge"
                                              th:classappend="${appointment.status.name() == 'CONFIRMED'} ? ' badge-primary' :
                                                              (${appointment.status.name() == 'COMPLETED'} ? ' badge-success' :
                                                              (${appointment.status.name() == 'CANCELLED'} ? ' badge-danger' :
                                                              (${appointment.status.name() == 'NO_SHOW'} ? ' badge-warning' : ' badge-secondary')))"
                                              th:text="${appointment.status}">
                                        </span>
                  </td>
                  <td>

                    <form th:if="${!now.isBefore(appointment.startTime.minusMinutes(5)) and !now.isAfter(appointment.startTime.plusMinutes(15))}"
                          th:action="@{/receptionist/dashboard/check-in}"
                          method="post"
                          class="mb-1">

                      <input type="hidden" name="appointmentId" th:value="${appointment.id}" />
                      <input type="hidden" name="sourcePage" value="check-in" />
                      <input type="hidden" name="patientId" th:value="${patientId}" />
                      <input type="hidden" name="doctorId" th:value="${doctorId}" />
                      <input type="hidden" name="page" th:value="${currentPage}" />

                      <button type="submit" class="btn btn-sm btn-success btn-block">
                        Check In
                      </button>
                    </form>


                    <div th:if="${now.isBefore(appointment.startTime.minusMinutes(5))}"
                         class="text-muted small">
                      Too early for check-in
                    </div>


                    <div th:if="${now.isAfter(appointment.startTime.plusMinutes(15)) and now.isBefore(appointment.endTime)}"
                         class="text-muted small">
                      Check-in window passed
                    </div>


                    <form th:if="${now.isAfter(appointment.endTime)}"
                          th:action="@{/receptionist/dashboard/no-show}"
                          method="post"
                          class="mt-1">

                      <input type="hidden" name="appointmentId" th:value="${appointment.id}" />
                      <input type="hidden" name="sourcePage" value="check-in" />
                      <input type="hidden" name="patientId" th:value="${patientId}" />
                      <input type="hidden" name="doctorId" th:value="${doctorId}" />
                      <input type="hidden" name="page" th:value="${currentPage}" />

                      <button type="submit" class="btn btn-sm btn-warning btn-block">
                        Mark No Show
                      </button>

                      <small class="form-text text-muted">
                        Generates a cancellation fee bill
                      </small>
                    </form>

                  </td>
                </tr>
                </tbody>
              </table>
            </div>

            <!-- Pagination -->
            <div class="mt-3 d-flex justify-content-between" th:if="${appointmentPage != null}">
              <a class="btn btn-outline-primary btn-sm"
                 th:if="${!appointmentPage.first}"
                 th:href="@{/receptionist/dashboard/check-in(
                                    page=${currentPage - 1},
                                    patientId=${patientId},
                                    doctorId=${doctorId}
                               )}">
                Previous
              </a>
              <span th:if="${appointmentPage.first}"></span>

              <a class="btn btn-outline-primary btn-sm"
                 th:if="${!appointmentPage.last}"
                 th:href="@{/receptionist/dashboard/check-in(
                                    page=${currentPage + 1},
                                    patientId=${patientId},
                                    doctorId=${doctorId}
                               )}">
                Next
              </a>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div th:replace="~{pageFragments/receptionistFooter :: footer}"></div>
  </div>
</div>

<script th:src="@{/dashboard/vendor/jquery/jquery.min.js}"></script>
<script th:src="@{/dashboard/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dashboard/js/sb-admin-2.min.js}"></script>

</body>
</html>

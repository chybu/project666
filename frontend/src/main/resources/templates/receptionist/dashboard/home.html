<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Receptionist Dashboard</title>
    <link th:href="@{/dashboard/css/sb-admin-2.min.css}" rel="stylesheet">
</head>

<body id="page-top">

<div id="wrapper">

    <!-- Sidebar -->
    <div th:replace="pageFragments/receptionistSidebar :: sidebar"></div>

    <div id="content-wrapper" class="d-flex flex-column">

        <div id="content">

            <!-- Topbar -->
            <div th:replace="pageFragments/receptionistTopbar :: topbar"></div>

            <div class="container-fluid">

                <h1 class="h3 mb-4 text-gray-800">Receptionist Dashboard</h1>

                <!-- Calendar -->
                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Calendar</h6>
                    </div>
                    <div class="card-body">
                        Calendar goes here (FullCalendar later)
                    </div>
                </div>

                <!-- Staff Bulletin -->
                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Staff Bulletin</h6>
                    </div>
                    <div class="card-body">
                        <ul>
                            <li>Reminder: Dr. Smith off Friday</li>
                            <li>System maintenance tonight at 10PM</li>
                            <li>New intake procedures updated</li>
                        </ul>
                    </div>
                </div>

            </div>
        </div>

        <!-- Footer -->
        <div th:replace="pageFragments/receptionistFooter :: footer"></div>

    </div>
</div>

<script th:src="@{/dashboard/vendor/jquery/jquery.min.js}"></script>
<script th:src="@{/dashboard/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dashboard/js/sb-admin-2.min.js}"></script>

</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Lab Request PDF</title>
    <style>
        @page {
            size: A4;
            margin: 20mm;
        }

        body {
            font-family: Arial, sans-serif;
            font-size: 12px;
            color: #222;
            line-height: 1.5;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 24px;
        }

        h2 {
            margin: 24px 0 10px;
            font-size: 16px;
        }

        .brand-header {
            margin-bottom: 18px;
        }

        .brand-logo {
            width: 140px;
            height: auto;
            margin-bottom: 12px;
        }

        .muted {
            color: #666;
        }

        .summary-table,
        .test-table {
            width: 100%;
            border-collapse: collapse;
        }

        .summary-table td {
            width: 50%;
            padding: 6px 10px 6px 0;
            vertical-align: top;
        }

        .test-table th,
        .test-table td {
            border: 1px solid #bdbdbd;
            padding: 8px;
            vertical-align: top;
            text-align: left;
        }

        .test-table th {
            background: #f3f4f6;
        }

        .section {
            margin-top: 18px;
        }

        .last-page {
            page-break-before: always;
            text-align: center;
        }

        .last-page-image {
            max-width: 100%;
            max-height: 240mm;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="brand-header">
        <img src="images/logo.png" alt="Duplex Logo" class="brand-logo" />
    </div>

    <h1>Lab Request</h1>
    <div class="muted">Lab Request ID: <span th:text="${lab.id}"></span></div>

    <div class="section">
        <table class="summary-table">
            <tr>
                <td>
                    <strong>Patient:</strong>
                    <span th:text="${lab.patient != null ? lab.patient.fullName : 'N/A'}"></span>
                </td>
                <td>
                    <strong>Doctor:</strong>
                    <span th:text="${lab.doctor != null ? lab.doctor.fullName : 'N/A'}"></span>
                </td>
            </tr>
            <tr>
                <td>
                    <strong>Status:</strong>
                    <span th:text="${lab.status}"></span>
                </td>
                <td>
                    <strong>Appointment Start:</strong>
                    <span th:text="${lab.appointment != null ? #temporals.format(lab.appointment.startTime, 'yyyy-MM-dd h:mm a') : 'N/A'}"></span>
                </td>
            </tr>
            <tr>
                <td>
                    <strong>Appointment Type:</strong>
                    <span th:text="${lab.appointment != null ? lab.appointment.type : 'N/A'}"></span>
                </td>
                <td>
                    <strong>Created At:</strong>
                    <span th:text="${lab.createdAt != null ? #temporals.format(lab.createdAt, 'yyyy-MM-dd h:mm a') : 'N/A'}"></span>
                </td>
            </tr>
            <tr>
                <td>
                    <strong>Last Updated:</strong>
                    <span th:text="${lab.lastUpdated != null ? #temporals.format(lab.lastUpdated, 'yyyy-MM-dd h:mm a') : 'N/A'}"></span>
                </td>
                <td>
                    <strong>Printed At:</strong>
                    <span th:text="${#temporals.format(printedAt, 'yyyy-MM-dd h:mm a')}"></span>
                </td>
            </tr>
            <tr>
                <td>
                    <strong>Printed By:</strong>
                    <span th:text="${printedBy}"></span>
                </td>
                <td>
                    <strong>Role:</strong>
                    <span th:text="${printedByRole}"></span>
                </td>
            </tr>
            <tr>
                <td>
                    <strong>User ID:</strong>
                    <span th:text="${printedByUserId}"></span>
                </td>
                <td></td>
            </tr>
        </table>
    </div>

    <div class="section">
        <h2>Tests</h2>
        <table class="test-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Code</th>
                    <th>Status</th>
                    <th>Result</th>
                    <th>Unit</th>
                    <th>Lab Technician</th>
                    <th>Doctor Note</th>
                    <th>Lab Technician Note</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(lab.labTests)}">
                    <td colspan="8">No lab tests found.</td>
                </tr>
                <tr th:each="test : ${lab.labTests}">
                    <td th:text="${test.name != null ? test.name : 'N/A'}"></td>
                    <td th:text="${test.code != null ? test.code : 'N/A'}"></td>
                    <td th:text="${test.status != null ? test.status : 'N/A'}"></td>
                    <td th:text="${test.result != null ? test.result : 'N/A'}"></td>
                    <td th:text="${test.unit != null ? test.unit : 'N/A'}"></td>
                    <td th:text="${test.labTechnician != null ? test.labTechnician.fullName : 'Unassigned'}"></td>
                    <td th:text="${test.doctorNote != null ? test.doctorNote : 'N/A'}"></td>
                    <td th:text="${test.labTechnicianNote != null ? test.labTechnicianNote : 'N/A'}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="last-page">
        <img src="images/Rickroll.jpg" alt="Rickroll" class="last-page-image" />
    </div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Access Requests</title>
    <link th:href="@{/dashboard/css/sb-admin-2.min.css}" rel="stylesheet">
</head>
<body id="page-top">
<div id="wrapper">
    <div th:replace="pageFragments/patientSidebar :: sidebar"></div>
    <div id="content-wrapper" class="d-flex flex-column" style="margin-left: 225px;">
        <div id="content">
            <div th:replace="pageFragments/patientTopbar :: topbar"></div>
            <div class="container-fluid">
                <h1 class="h3 mb-4 text-gray-800">Patient Access Requests</h1>

                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                <div class="card shadow mb-4">
                    <div class="card-header py-3 d-flex justify-content-between align-items-center">
                        <h6 class="m-0 font-weight-bold text-primary">Access Request Results</h6>
                        <span class="text-muted small"
                              th:text="'Showing ' + ${#lists.size(accessRequests)} + ' request(s)'"></span>
                    </div>
                    <div class="card-body">
                        <form method="get" th:action="@{/patient/dashboard/accessRequests}" class="mb-4">
                            <div class="form-row">
                                <div class="form-group col-md-3">
                                    <label for="doctorId">Doctor</label>
                                    <select class="form-control" id="doctorId" name="doctorId">
                                        <option value="">All doctors</option>
                                        <option th:each="doctor : ${doctors}"
                                                th:value="${doctor.id}"
                                                th:text="${doctor.firstName + ' ' + doctor.lastName}"
                                                th:selected="${doctorId != null and doctorId == doctor.id}">
                                        </option>
                                    </select>
                                </div>
                                <div class="form-group col-md-2">
                                    <label for="recordType">Record Type</label>
                                    <select class="form-control" id="recordType" name="recordType">
                                        <option value="">All</option>
                                        <option th:each="recordTypeOption : ${recordTypes}"
                                                th:value="${recordTypeOption}"
                                                th:text="${recordTypeOption}"
                                                th:selected="${recordType != null and recordType == recordTypeOption}">
                                        </option>
                                    </select>
                                </div>
                                <div class="form-group col-md-2">
                                    <label for="status">Status</label>
                                    <select class="form-control" id="status" name="status">
                                        <option value="" th:selected="${status == null}">All</option>
                                        <option th:each="statusOption : ${accessRequestStatuses}"
                                                th:value="${statusOption}"
                                                th:text="${statusOption}"
                                                th:selected="${status != null and status == statusOption}">
                                        </option>
                                    </select>
                                </div>
                                <div class="form-group col-md-2">
                                    <label for="from">Min Date</label>
                                    <input type="date" class="form-control" id="from" name="from" th:value="${from}">
                                </div>
                                <div class="form-group col-md-2">
                                    <label for="end">Max Date</label>
                                    <input type="date" class="form-control" id="end" name="end" th:value="${end}">
                                </div>
                            </div>
                            <div class="mt-2">
                                <button type="submit" class="btn btn-primary btn-sm">Search</button>
                                <a th:href="@{/patient/dashboard/accessRequests}" class="btn btn-secondary btn-sm">Reset</a>
                            </div>
                        </form>

                        <div th:if="${filterError}" class="alert alert-danger mt-3" th:text="${filterError}"></div>

                        <hr class="my-4">

                        <div th:if="${#lists.isEmpty(accessRequests)}" class="text-muted">No requests found.</div>

                        <div th:if="${!#lists.isEmpty(accessRequests)}" class="table-responsive">
                            <table class="table table-bordered table-hover">
                                <thead>
                                <tr>
                                    <th>Doctor</th>
                                    <th>Record Type</th>
                                    <th>Status</th>
                                    <th>Date</th>
                                    <th>Action</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="ar : ${accessRequests}">
                                    <td th:text="${ar.doctor.fullName}"></td>
                                    <td th:text="${ar.recordType}"></td>
                                    <td>
                                        <span class="badge"
                                              th:classappend="
                                                ${ar.status.name() == 'APPROVED'} ? 'badge-success' :
                                                (${ar.status.name() == 'PENDING'} ? 'badge-warning' :
                                                (${ar.status.name() == 'REJECTED' or ar.status.name() == 'CANCELLED'} ? 'badge-danger' :
                                                (${ar.status.name() == 'REVOKED'} ? 'badge-primary' :
                                                'badge-secondary')))"
                                              th:text="${ar.status}">
                                        </span>
                                    </td>
                                    <td th:text="${#temporals.format(ar.createdAt, 'yyyy-MM-dd')}"></td>
                                    <td>
                                        <div th:if="${ar.status != null and ar.status.name() == 'PENDING'}">
                                            <form th:action="@{/patient/dashboard/accessRequests/{id}/approve(id=${ar.id})}"
                                                  method="post"
                                                  class="d-inline">
                                                <input type="hidden" name="doctorId" th:value="${doctorId}" />
                                                <input type="hidden" name="recordType" th:value="${recordType}" />
                                                <input type="hidden" name="status" th:value="${status}" />
                                                <input type="hidden" name="from" th:value="${from}" />
                                                <input type="hidden" name="end" th:value="${end}" />
                                                <button type="submit" class="btn btn-sm btn-success">Approve</button>
                                            </form>
                                            <form th:action="@{/patient/dashboard/accessRequests/{id}/deny(id=${ar.id})}"
                                                  method="post"
                                                  class="d-inline">
                                                <input type="hidden" name="doctorId" th:value="${doctorId}" />
                                                <input type="hidden" name="recordType" th:value="${recordType}" />
                                                <input type="hidden" name="status" th:value="${status}" />
                                                <input type="hidden" name="from" th:value="${from}" />
                                                <input type="hidden" name="end" th:value="${end}" />
                                                <button type="submit" class="btn btn-sm btn-danger">Deny</button>
                                            </form>
                                        </div>
                                        <div th:if="${ar.status != null and ar.status.name() == 'APPROVED'}">
                                            <form th:action="@{/patient/dashboard/accessRequests/{id}/revoke(id=${ar.id})}"
                                                  method="post"
                                                  class="d-inline">
                                                <input type="hidden" name="doctorId" th:value="${doctorId}" />
                                                <input type="hidden" name="recordType" th:value="${recordType}" />
                                                <input type="hidden" name="status" th:value="${status}" />
                                                <input type="hidden" name="from" th:value="${from}" />
                                                <input type="hidden" name="end" th:value="${end}" />
                                                <button type="submit" class="btn btn-sm btn-warning">Revoke</button>
                                            </form>
                                        </div>
                                        <span th:if="${ar.status == null or (ar.status.name() != 'PENDING' and ar.status.name() != 'APPROVED')}"
                                              class="text-muted small">
                                            No action
                                        </span>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div th:replace="pageFragments/patientFooter :: footer"></div>
    </div>
</div>
<script th:src="@{/dashboard/vendor/jquery/jquery.min.js}"></script>
<script th:src="@{/dashboard/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dashboard/js/sb-admin-2.min.js}"></script>
</body>
</html>

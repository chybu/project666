<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Finances</title>
    <link th:href="@{/dashboard/css/sb-admin-2.min.css}" rel="stylesheet">
</head>

<body id="page-top">
<div id="wrapper">

    <div th:replace="pageFragments/patientSidebar :: sidebar"></div>

    <div id="content-wrapper" class="d-flex flex-column">
        <div id="content">

            <div th:replace="pageFragments/patientTopbar :: topbar"></div>

            <div class="container-fluid">

                <h1 class="h3 mb-4 text-gray-800">Finances</h1>

                <!-- Appointment Bills -->
                <div class="card shadow mb-4">
                    <div class="card-header">
                        Appointment Bills
                    </div>
                    <div class="card-body">

                        <div th:if="${#lists.isEmpty(appointmentBills)}">
                            No appointment bills found.
                        </div>

                        <table class="table table-bordered" th:if="${!#lists.isEmpty(appointmentBills)}">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="bill : ${appointmentBills}">
                                    <td th:text="${#temporals.format(bill.createdAt, 'yyyy-MM-dd')}"></td>
                                    <td th:text="${bill.amount}"></td>
                                    <td th:text="${bill.status}"></td>
                                </tr>
                            </tbody>
                        </table>

                    </div>
                </div>

                <!-- Lab Bills -->
                <div class="card shadow mb-4">
                    <div class="card-header">
                        Lab Bills
                    </div>
                    <div class="card-body">

                        <div th:if="${#lists.isEmpty(labBills)}">
                            No lab bills found.
                        </div>

                        <table class="table table-bordered" th:if="${!#lists.isEmpty(labBills)}">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Amount</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="bill : ${labBills}">
                                    <td th:text="${#temporals.format(bill.createdAt, 'yyyy-MM-dd')}"></td>
                                    <td th:text="${bill.amount}"></td>
                                    <td th:text="${bill.status}"></td>
                                </tr>
                            </tbody>
                        </table>

                    </div>
                </div>

            </div>
        </div>

        <div th:replace="pageFragments/patientFooter :: footer"></div>
    </div>
</div>

<script th:src="@{/dashboard/vendor/jquery/jquery.min.js}"></script>
<script th:src="@{/dashboard/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dashboard/js/sb-admin-2.min.js}"></script>

</body>
</html>

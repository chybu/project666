<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lab Request Queue</title>
    <link th:href="@{/dashboard/css/sb-admin-2.min.css}" rel="stylesheet">
</head>
<body id="page-top">
<div id="wrapper">

    <div th:replace="pageFragments/labtechnicianSidebar :: sidebar"></div>

    <div id="content-wrapper" class="d-flex flex-column" style="margin-left: 225px;">
        <div id="content">

            <div th:replace="pageFragments/labtechnicianTopbar :: topbar"></div>

            <div class="container-fluid">
                <h1 class="h3 mb-4 text-gray-800">Lab Request Queue</h1>

                <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Filters</h6>
                    </div>
                    <div class="card-body">
                        <form method="get" th:action="@{/labtechnician/dashboard/lab-requests}">
                            <div class="form-row">
                                <div class="form-group col-md-4">
                                    <label>Patient ID</label>
                                    <select name="patientId" class="form-control">
                                        <option value="">All Patients</option>
                                        <option th:each="p : ${patients}"
                                                th:value="${p.id}"
                                                th:selected="${patientId != null and p.id == patientId}"
                                                th:text="${p.firstName + ' ' + p.lastName}">
                                        </option>
                                    </select>
                                </div>
                                <div class="form-group col-md-4">
                                    <label>Doctor ID</label>
                                    <select name="doctorId" class="form-control">
                                        <option value="">All Doctors</option>
                                        <option th:each="d : ${doctors}"
                                                th:value="${d.id}"
                                                th:selected="${doctorId != null and d.id == doctorId}"
                                                th:text="${d.firstName + ' ' + d.lastName}">
                                        </option>
                                    </select>
                                </div>
                                <div class="form-group col-md-4">
                                    <label>Created Date</label>
                                    <input type="date" name="createdAtDate" class="form-control" th:value="${createdAtDate}">
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary">Search</button>
                            <a th:href="@{/labtechnician/dashboard/lab-requests}" class="btn btn-secondary">Reset</a>
                        </form>
                    </div>
                </div>

                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Unfinished Requests</h6>
                    </div>
                    <div class="card-body">
                        <div th:if="${labRequestsPage == null or #lists.isEmpty(labRequestsPage.content)}" class="text-muted">
                            No unfinished lab requests found.
                        </div>

                        <div th:each="labRequest : ${labRequestsPage.content}" class="card border-left-primary shadow-sm mb-4">
                            <div class="card-body">
                                <div class="row">
                                    <div class="col-md-3">
                                        <strong>Request Status:</strong>
                                        <span th:text="${labRequest.status}"></span>
                                    </div>
                                    <div class="col-md-3">
                                        <strong>Patient:</strong>
                                        <span th:text="${labRequest.patient != null ? labRequest.patient.firstName + ' ' + labRequest.patient.lastName : 'N/A'}"></span>
                                    </div>
                                    <div class="col-md-3">
                                        <strong>Doctor:</strong>
                                        <span th:text="${labRequest.doctor != null ? labRequest.doctor.firstName + ' ' + labRequest.doctor.lastName : 'N/A'}"></span>
                                    </div>
                                    <div class="col-md-3">
                                        <strong>Created:</strong>
                                        <span th:text="${#temporals.format(labRequest.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                                    </div>
                                </div>

                                <div class="mt-3">
                                    <strong>Tests:</strong>
                                    <span th:text="${labRequest.labTests != null ? #lists.size(labRequest.labTests) : 0}"></span>
                                </div>

                                <div class="table-responsive mt-3" th:if="${labRequest.labTests != null}">
                                    <table class="table table-bordered">
                                        <thead>
                                        <tr>
                                            <th>Name</th>
                                            <th>Code</th>
                                            <th>Unit</th>
                                            <th>Status</th>
                                            <th>Result</th>
                                            <th>Action</th>
                                        </tr>
                                        </thead>
                                        <tbody>
                                        <tr th:each="labTest : ${labRequest.labTests}">
                                            <td th:text="${labTest.name}"></td>
                                            <td th:text="${labTest.code}"></td>
                                            <td th:text="${labTest.unit}"></td>
                                            <td>
                                                <span class="badge badge-warning" th:if="${labTest.status.name() == 'REQUESTED'}">REQUESTED</span>
                                                <span class="badge badge-info" th:if="${labTest.status.name() == 'IN_PROGRESS'}">IN_PROGRESS</span>
                                                <span class="badge badge-success" th:if="${labTest.status.name() == 'COMPLETED'}">COMPLETED</span>
                                                <span class="badge badge-danger" th:if="${labTest.status.name() == 'CANCELLED'}">CANCELLED</span>
                                            </td>
                                            <td th:text="${labTest.result} ?: '-'"></td>
                                            <td>
                                                <form th:if="${labTest.status.name() == 'REQUESTED'}"
                                                      th:action="@{'/labtechnician/dashboard/lab-tests/' + ${labTest.id} + '/claim'}"
                                                      method="post">
                                                    <input type="hidden" name="patientId" th:value="${patientId}">
                                                    <input type="hidden" name="doctorId" th:value="${doctorId}">
                                                    <input type="hidden" name="createdAtDate" th:value="${createdAtDate}">
                                                    <input type="hidden" name="page" th:value="${page}">
                                                    <input type="hidden" name="size" th:value="${size}">
                                                    <button type="submit" class="btn btn-sm btn-primary">Claim</button>
                                                </form>
                                                <span th:if="${labTest.status.name() != 'REQUESTED'}" class="text-muted">No action</span>
                                            </td>
                                        </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <div class="mt-3" th:if="${labRequestsPage != null}">
                            <a th:if="${!labRequestsPage.first}"
                               class="btn btn-outline-primary btn-sm"
                               th:href="@{/labtechnician/dashboard/lab-requests(
                                    patientId=${patientId},
                                    doctorId=${doctorId},
                                    createdAtDate=${createdAtDate},
                                    page=${page - 1},
                                    size=${size}
                               )}">
                                Previous
                            </a>

                            <a th:if="${!labRequestsPage.last}"
                               class="btn btn-outline-primary btn-sm"
                               th:href="@{/labtechnician/dashboard/lab-requests(
                                    patientId=${patientId},
                                    doctorId=${doctorId},
                                    createdAtDate=${createdAtDate},
                                    page=${page + 1},
                                    size=${size}
                               )}">
                                Next
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:replace="pageFragments/labtechnicianFooter :: footer"></div>
    </div>
</div>

<script th:src="@{/dashboard/vendor/jquery/jquery.min.js}"></script>
<script th:src="@{/dashboard/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dashboard/js/sb-admin-2.min.js}"></script>
</body>
</html>

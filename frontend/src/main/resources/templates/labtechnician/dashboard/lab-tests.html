<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Lab Tests</title>
    <link th:href="@{/dashboard/css/sb-admin-2.min.css}" rel="stylesheet">
</head>
<body id="page-top">
<div id="wrapper">

    <div th:replace="pageFragments/labtechnicianSidebar :: sidebar"></div>

    <div id="content-wrapper" class="d-flex flex-column" style="margin-left: 225px;">
        <div id="content">

            <div th:replace="pageFragments/labtechnicianTopbar :: topbar"></div>

            <div class="container-fluid">
                <h1 class="h3 mb-4 text-gray-800">My Lab Tests</h1>

                <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Filters</h6>
                    </div>
                    <div class="card-body">
                        <form method="get" th:action="@{/labtechnician/dashboard/lab-tests}">
                            <div class="form-row">
                                <div class="form-group col-md-3">
                                    <label>Patient ID</label>
                                    <select name="patientId" class="form-control">
                                        <option value="">All Patients</option>
                                        <option th:each="p : ${patients}"
                                                th:value="${p.id}"
                                                th:selected="${patientId != null and p.id == patientId}"
                                                th:text="${p.firstName + ' ' + p.lastName}">
                                        </option>
                                    </select>
                                </div>
                                <div class="form-group col-md-3">
                                    <label>Doctor ID</label>
                                    <select name="doctorId" class="form-control">
                                        <option value="">All Doctors</option>
                                        <option th:each="d : ${doctors}"
                                                th:value="${d.id}"
                                                th:selected="${doctorId != null and d.id == doctorId}"
                                                th:text="${d.firstName + ' ' + d.lastName}">
                                        </option>
                                    </select>
                                </div>
                                <div class="form-group col-md-2">
                                    <label>Status</label>
                                    <select name="status" class="form-control">
                                        <option value="">All</option>
                                        <option value="IN_PROGRESS" th:selected="${status == 'IN_PROGRESS'}">IN_PROGRESS</option>
                                        <option value="COMPLETED" th:selected="${status == 'COMPLETED'}">COMPLETED</option>
                                        <option value="CANCELLED" th:selected="${status == 'CANCELLED'}">CANCELLED</option>
                                    </select>
                                </div>
                                <div class="form-group col-md-2">
                                    <label>Created Date</label>
                                    <input type="date" name="createdAtDate" class="form-control" th:value="${createdAtDate}">
                                </div>
                                <div class="form-group col-md-2">
                                    <label>Code</label>
                                    <input type="text" name="code" class="form-control" th:value="${code}">
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group col-md-4">
                                    <label>Name</label>
                                    <input type="text" name="name" class="form-control" th:value="${name}">
                                </div>
                                <div class="form-group col-md-4">
                                    <label>Unit</label>
                                    <input type="text" name="unit" class="form-control" th:value="${unit}">
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary">Search</button>
                            <a th:href="@{/labtechnician/dashboard/lab-tests}" class="btn btn-secondary">Reset</a>
                        </form>
                    </div>
                </div>

                <div class="card shadow mb-4">
                    <div class="card-header py-3">
                        <h6 class="m-0 font-weight-bold text-primary">Assigned Tests</h6>
                    </div>
                    <div class="card-body">
                        <div th:if="${labTestsPage == null or #lists.isEmpty(labTestsPage.content)}" class="text-muted">
                            No lab tests found.
                        </div>

                        <div th:each="labTest : ${labTestsPage.content}" class="card shadow-sm mb-4">
                            <div class="card-body">
                                <div class="row mb-3">
                                    <div class="col-md-2">
                                        <strong>Name:</strong>
                                        <div th:text="${labTest.name}"></div>
                                    </div>
                                    <div class="col-md-2">
                                        <strong>Code:</strong>
                                        <div th:text="${labTest.code} ?: '-'"></div>
                                    </div>
                                    <div class="col-md-2">
                                        <strong>Unit:</strong>
                                        <div th:text="${labTest.unit} ?: '-'"></div>
                                    </div>
                                    <div class="col-md-2">
                                        <strong>Status:</strong>
                                        <div th:text="${labTest.status}"></div>
                                    </div>
                                    <div class="col-md-2">
                                        <strong>Result:</strong>
                                        <div th:text="${labTest.result} ?: '-'"></div>
                                    </div>
                                    <div class="col-md-2">
                                        <strong>Created:</strong>
                                        <div th:text="${#temporals.format(labTest.createdAt, 'yyyy-MM-dd HH:mm')}"></div>
                                    </div>
                                </div>

                                <div th:if="${labTest.status.name() == 'IN_PROGRESS'}">
                                    <form method="post" th:action="@{/labtechnician/dashboard/lab-tests/update}">
                                        <input type="hidden" name="labTestId" th:value="${labTest.id}"/>

                                        <input type="hidden" name="patientId" th:value="${patientId}">
                                        <input type="hidden" name="doctorId" th:value="${doctorId}">
                                        <input type="hidden" name="status" th:value="${status}">
                                        <input type="hidden" name="filterCode" th:value="${code}">
                                        <input type="hidden" name="filterName" th:value="${name}">
                                        <input type="hidden" name="filterUnit" th:value="${unit}">
                                        <input type="hidden" name="createdAtDate" th:value="${createdAtDate}">
                                        <input type="hidden" name="page" th:value="${page}">
                                        <input type="hidden" name="size" th:value="${size}">

                                        <div class="form-row">
                                            <div class="form-group col-md-2">
                                                <label>Code</label>
                                                <input type="text" name="code" class="form-control" th:value="${labTest.code}">
                                            </div>
                                            <div class="form-group col-md-2">
                                                <label>Name</label>
                                                <input type="text" name="name" class="form-control" th:value="${labTest.name}">
                                            </div>
                                            <div class="form-group col-md-2">
                                                <label>Unit</label>
                                                <input type="text" name="unit" class="form-control" th:value="${labTest.unit}">
                                            </div>
                                            <div class="form-group col-md-3">
                                                <label>Result</label>
                                                <input type="text" name="result" class="form-control" th:value="${labTest.result}">
                                            </div>
                                            <div class="form-group col-md-3">
                                                <label>Lab Technician Note</label>
                                                <input type="text" name="labTechnicianNote" class="form-control" th:value="${labTest.labTechnicianNote}">
                                            </div>
                                        </div>

                                        <button type="submit" class="btn btn-primary btn-sm">Save Update</button>
                                    </form>

                                    <form method="post"
                                          class="mt-2"
                                          th:action="@{'/labtechnician/dashboard/lab-tests/' + ${labTest.id} + '/submit'}">
                                        <input type="hidden" name="patientId" th:value="${patientId}">
                                        <input type="hidden" name="doctorId" th:value="${doctorId}">
                                        <input type="hidden" name="status" th:value="${status}">
                                        <input type="hidden" name="code" th:value="${code}">
                                        <input type="hidden" name="name" th:value="${name}">
                                        <input type="hidden" name="unit" th:value="${unit}">
                                        <input type="hidden" name="createdAtDate" th:value="${createdAtDate}">
                                        <input type="hidden" name="page" th:value="${page}">
                                        <input type="hidden" name="size" th:value="${size}">
                                        <button type="submit" class="btn btn-success btn-sm">Submit Test</button>
                                    </form>
                                </div>

                                <div th:if="${labTest.status.name() != 'IN_PROGRESS'}" class="text-muted">
                                    This test is not editable.
                                </div>
                            </div>
                        </div>

                        <div class="mt-3" th:if="${labTestsPage != null}">
                            <a th:if="${!labTestsPage.first}"
                               class="btn btn-outline-primary btn-sm"
                               th:href="@{/labtechnician/dashboard/lab-tests(
                                   patientId=${patientId},
                                   doctorId=${doctorId},
                                   status=${status},
                                   code=${code},
                                   name=${name},
                                   unit=${unit},
                                   createdAtDate=${createdAtDate},
                                   page=${page - 1},
                                   size=${size}
                               )}">
                                Previous
                            </a>

                            <a th:if="${!labTestsPage.last}"
                               class="btn btn-outline-primary btn-sm"
                               th:href="@{/labtechnician/dashboard/lab-tests(
                                   patientId=${patientId},
                                   doctorId=${doctorId},
                                   status=${status},
                                   code=${code},
                                   name=${name},
                                   unit=${unit},
                                   createdAtDate=${createdAtDate},
                                   page=${page + 1},
                                   size=${size}
                               )}">
                                Next
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:replace="pageFragments/labtechnicianFooter :: footer"></div>
    </div>
</div>

<script th:src="@{/dashboard/vendor/jquery/jquery.min.js}"></script>
<script th:src="@{/dashboard/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dashboard/js/sb-admin-2.min.js}"></script>
</body>
</html>

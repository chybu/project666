<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Lab Tests</title>
    <link th:href="@{/dashboard/css/sb-admin-2.min.css}" rel="stylesheet">
    <style>
        .lab-test-summary {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem 1.5rem;
            align-items: center;
        }
        .lab-test-summary > div {
            min-width: 0;
        }
        .lab-test-second-row {
            flex-basis: 100%;
        }
        .lab-test-value {
            overflow-wrap: anywhere;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .lab-test-summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .lab-test-edit-panel {
            background: #f8f9fc;
            border: 1px solid #e3e6f0;
            border-radius: 0.35rem;
            padding: 1rem;
        }
    </style>
</head>
<body id="page-top">
<div id="wrapper">

    <div th:replace="pageFragments/labtechnicianSidebar :: sidebar"></div>

    <div id="content-wrapper" class="d-flex flex-column" style="margin-left: 225px;">
        <div id="content">

            <div th:replace="pageFragments/labtechnicianTopbar :: topbar"></div>

            <div class="container-fluid">
                <h1 class="h3 mb-4 text-gray-800">My Lab Tests</h1>

                <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
                <div th:if="${filterError}" class="alert alert-danger" th:text="${filterError}"></div>

                <div class="card shadow mb-4">
                    <div class="card-header py-3 d-flex justify-content-between align-items-center">
                        <h6 class="m-0 font-weight-bold text-primary">Assigned Tests</h6>
                        <span class="text-muted small"
                              th:text="'Showing ' + ${labTestsPage != null ? #lists.size(labTestsPage.content) : 0} + ' lab test(s)'"></span>
                    </div>
                    <div class="card-body">
                        <form method="get" th:action="@{/labtechnician/dashboard/lab-tests}" class="mb-0">
                            <div class="form-row">
                                <div class="form-group col-md-3 mb-2">
                                    <label class="mb-1">Patient</label>
                                    <select name="patientId" class="form-control">
                                        <option value="">All Patients</option>
                                        <option th:each="p : ${patients}"
                                                th:value="${p.id}"
                                                th:selected="${patientId != null and p.id == patientId}"
                                                th:text="${p.firstName + ' ' + p.lastName}">
                                        </option>
                                    </select>
                                </div>
                                <div class="form-group col-md-3 mb-2">
                                    <label class="mb-1">Doctor</label>
                                    <select name="doctorId" class="form-control">
                                        <option value="">All Doctors</option>
                                        <option th:each="d : ${doctors}"
                                                th:value="${d.id}"
                                                th:selected="${doctorId != null and d.id == doctorId}"
                                                th:text="${d.firstName + ' ' + d.lastName}">
                                        </option>
                                    </select>
                                </div>
                                <div class="form-group col-md-2 mb-2">
                                    <label class="mb-1">Status</label>
                                    <select name="status" class="form-control">
                                        <option value="IN_PROGRESS" th:selected="${status == 'IN_PROGRESS'}">IN_PROGRESS</option>
                                        <option value="COMPLETED" th:selected="${status == 'COMPLETED'}">COMPLETED</option>
                                        <option value="CANCELLED" th:selected="${status == 'CANCELLED'}">CANCELLED</option>
                                    </select>
                                </div>
                                <div class="form-group col-md-2 mb-2">
                                    <label class="mb-1">Min Date</label>
                                    <input type="date" name="minDate" class="form-control" th:value="${minDate}">
                                </div>
                                <div class="form-group col-md-2 mb-2">
                                    <label class="mb-1">Max Date</label>
                                    <input type="date" name="maxDate" class="form-control" th:value="${maxDate}">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group col-md-4 mb-2">
                                    <label class="mb-1">Code</label>
                                    <input type="text" name="code" class="form-control" th:value="${code}">
                                </div>
                                <div class="form-group col-md-4 mb-2">
                                    <label class="mb-1">Name</label>
                                    <input type="text" name="name" class="form-control" th:value="${name}">
                                </div>
                                <div class="form-group col-md-4 mb-2">
                                    <label class="mb-1">Unit</label>
                                    <input type="text" name="unit" class="form-control" th:value="${unit}">
                                </div>
                            </div>
                            <div class="form-row align-items-end">
                                <div class="form-group col-auto mb-2">
                                    <button type="submit" class="btn btn-primary">Search</button>
                                </div>
                                <div class="form-group col-auto mb-2">
                                    <a th:href="@{/labtechnician/dashboard/lab-tests}" class="btn btn-secondary">Reset</a>
                                </div>
                            </div>
                        </form>
                        <div class="mb-4"></div>
                        <div th:if="${labTestsPage == null or #lists.isEmpty(labTestsPage.content)}" class="text-muted">
                            No lab tests found.
                        </div>

                        <div th:each="labTest : ${labTestsPage.content}" class="card shadow-sm mb-4">
                            <div class="card-body">
                                <div class="lab-test-summary-row mb-3">
                                    <div class="lab-test-summary">
                                        <div>
                                            <strong>Name:</strong>
                                            <span th:text="${labTest.name}"></span>
                                        </div>
                                        <div>
                                            <strong>Code:</strong>
                                            <span th:text="${labTest.code} ?: '-'"></span>
                                        </div>
                                        <div>
                                            <strong>Unit:</strong>
                                            <span th:text="${labTest.unit} ?: '-'"></span>
                                        </div>
                                        <div>
                                            <strong>Status:</strong>
                                            <span class="badge badge-warning" th:if="${labTest.status.name() == 'REQUESTED'}">REQUESTED</span>
                                            <span class="badge badge-info" th:if="${labTest.status.name() == 'IN_PROGRESS'}">IN_PROGRESS</span>
                                            <span class="badge badge-success" th:if="${labTest.status.name() == 'COMPLETED'}">COMPLETED</span>
                                            <span class="badge badge-danger" th:if="${labTest.status.name() == 'CANCELLED'}">CANCELLED</span>
                                        </div>
                                        <div>
                                            <strong>Result:</strong>
                                            <span class="lab-test-value" th:text="${labTest.result} ?: '-'"></span>
                                        </div>
                                        <div>
                                            <strong>Created:</strong>
                                            <span th:text="${#temporals.format(labTest.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                                        </div>
                                        <div class="lab-test-second-row">
                                            <strong>Doctor Note:</strong>
                                            <span class="lab-test-value" th:text="${labTest.doctorNote} ?: '-'"></span>
                                        </div>
                                    </div>
                                    <form method="post"
                                          class="mb-0"
                                          th:if="${labTest.status.name() == 'IN_PROGRESS'}"
                                          th:action="@{'/labtechnician/dashboard/lab-tests/' + ${labTest.id} + '/submit'}">
                                        <input type="hidden" name="patientId" th:value="${patientId}">
                                        <input type="hidden" name="doctorId" th:value="${doctorId}">
                                        <input type="hidden" name="status" th:value="${status}">
                                        <input type="hidden" name="code" th:value="${code}">
                                        <input type="hidden" name="name" th:value="${name}">
                                        <input type="hidden" name="unit" th:value="${unit}">
                                        <input type="hidden" name="minDate" th:value="${minDate}">
                                        <input type="hidden" name="maxDate" th:value="${maxDate}">
                                        <input type="hidden" name="page" th:value="${page}">
                                        <input type="hidden" name="size" th:value="${size}">
                                        <button type="submit" class="btn btn-success btn-sm">Submit Test</button>
                                    </form>
                                </div>

                                <div th:if="${labTest.status.name() == 'IN_PROGRESS'}">
                                    <div class="lab-test-edit-panel">
                                        <form method="post" th:action="@{/labtechnician/dashboard/lab-tests/update}" class="mb-0">
                                            <input type="hidden" name="labTestId" th:value="${labTest.id}"/>

                                            <input type="hidden" name="patientId" th:value="${patientId}">
                                            <input type="hidden" name="doctorId" th:value="${doctorId}">
                                            <input type="hidden" name="status" th:value="${status}">
                                            <input type="hidden" name="filterCode" th:value="${code}">
                                            <input type="hidden" name="filterName" th:value="${name}">
                                            <input type="hidden" name="filterUnit" th:value="${unit}">
                                            <input type="hidden" name="minDate" th:value="${minDate}">
                                            <input type="hidden" name="maxDate" th:value="${maxDate}">
                                            <input type="hidden" name="page" th:value="${page}">
                                            <input type="hidden" name="size" th:value="${size}">
                                            <input type="hidden" name="code" th:value="${labTest.code}">
                                            <input type="hidden" name="name" th:value="${labTest.name}">
                                            <input type="hidden" name="unit" th:value="${labTest.unit}">

                                            <div class="form-row align-items-end">
                                                <div class="form-group col-md-6 mb-2">
                                                    <label class="mb-1">Result</label>
                                                    <textarea name="result" class="form-control" rows="2" th:text="${labTest.result}"></textarea>
                                                </div>
                                                <div class="form-group col-md-6 mb-2">
                                                    <label class="mb-1">Lab Technician Note</label>
                                                    <textarea name="labTechnicianNote" class="form-control" rows="2" th:text="${labTest.labTechnicianNote}"></textarea>
                                                </div>
                                            </div>

                                            <button type="submit" class="btn btn-primary btn-sm">Save Update</button>
                                        </form>
                                    </div>
                                </div>

                                <div th:if="${labTest.status.name() != 'IN_PROGRESS'}" class="text-muted">
                                    This test is not editable.
                                </div>
                            </div>
                        </div>

                        <div class="mt-3" th:if="${labTestsPage != null}">
                            <a th:if="${!labTestsPage.first}"
                               class="btn btn-outline-primary btn-sm"
                               th:href="@{/labtechnician/dashboard/lab-tests(
                                   patientId=${patientId},
                                   doctorId=${doctorId},
                                   status=${status},
                                   code=${code},
                                   name=${name},
                                   unit=${unit},
                                   minDate=${minDate},
                                   maxDate=${maxDate},
                                   page=${page - 1},
                                   size=${size}
                               )}">
                                Previous
                            </a>

                            <a th:if="${!labTestsPage.last}"
                               class="btn btn-outline-primary btn-sm"
                               th:href="@{/labtechnician/dashboard/lab-tests(
                                   patientId=${patientId},
                                   doctorId=${doctorId},
                                   status=${status},
                                   code=${code},
                                   name=${name},
                                   unit=${unit},
                                   minDate=${minDate},
                                   maxDate=${maxDate},
                                   page=${page + 1},
                                   size=${size}
                               )}">
                                Next
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:replace="pageFragments/labtechnicianFooter :: footer"></div>
    </div>
</div>

<script th:src="@{/dashboard/vendor/jquery/jquery.min.js}"></script>
<script th:src="@{/dashboard/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/dashboard/js/sb-admin-2.min.js}"></script>
</body>
</html>

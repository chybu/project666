services:
  db:
    image: postgres:14.20
    ports: 
      - "5432:5432"
    restart: always
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
  
  adminer:
    image: adminer:5.4.1
    restart: always
    ports: 
      - "8888:8080"

  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    command: start-dev
    ports:
      - "9090:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: password
      KC_DB: postgres
      KC_DB_URL_HOST: db
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak_app
      KC_DB_PASSWORD: password
    depends_on:
      - db
  portal:
    image: nginx:alpine
    container_name: patient-portal-ui
    ports:
      - "8080:80"
    volumes:
      - ./portal:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  token-proxy:
    build: ./proxy
    container_name: token-proxy
    ports:
      - "3001:3001"
    environment:
      - CLIENT_SECRET=PUT_CLIENT_SECRET_HERE
    restart: unless-stopped  

volumes:
  postgres-data:


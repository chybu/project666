services:
  db:
    image: postgres:14.20
    ports: 
      - "5432:5432"
    restart: always
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
  
  adminer:
    image: adminer:5.4.1
    restart: always
    ports: 
      - "8888:8080"

  keycloak:
    image: quay.io/keycloak/keycloak:26.5
    command: start-dev
    ports:
      - "9090:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: password
      KC_DB: postgres
      KC_DB_URL_HOST: db
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak_app
      KC_DB_PASSWORD: password
    depends_on:
      - db
    volumes:
      - ./providers:/opt/keycloak/providers
      - ./keycloak-theme/duplex:/opt/keycloak/themes/duplex

  rabbitmq:
    image: rabbitmq:4.2.5-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: insurance
      RABBITMQ_DEFAULT_PASS: password

volumes:
  postgres-data: